name: Staging Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "dashboard/**"
      - ".github/workflows/staging-deploy.yml"
      - ".github/actions/**"
  workflow_dispatch:

concurrency:
  group: staging-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  build-release-candidate:
    name: Build staging release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DASHBOARD_SESSION_SECRET: staging-build-session-secret-2026-03-19
      VERVET_API_BASE_URL: ${{ vars.STAGING_VERVET_API_BASE_URL || 'http://localhost:3000' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            dashboard/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Create release bundles
        run: |
          mkdir -p release-artifacts
          tar -czf release-artifacts/backend-staging-bundle.tgz \
            -C backend \
            dist \
            prisma \
            package.json \
            package-lock.json
          tar -czf release-artifacts/dashboard-staging-bundle.tgz \
            -C dashboard \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.ts

      - name: Create release manifest
        run: |
          generated_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > release-artifacts/staging-release-manifest.json <<JSON
          {
            "repository": "${{ github.repository }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "runId": "${{ github.run_id }}",
            "generatedAt": "${generated_at}"
          }
          JSON

      - name: Upload backend release bundle
        uses: actions/upload-artifact@v5
        with:
          name: backend-staging-bundle
          path: release-artifacts/backend-staging-bundle.tgz
          retention-days: 14

      - name: Upload dashboard release bundle
        uses: actions/upload-artifact@v5
        with:
          name: dashboard-staging-bundle
          path: release-artifacts/dashboard-staging-bundle.tgz
          retention-days: 14

      - name: Upload release manifest
        uses: actions/upload-artifact@v5
        with:
          name: staging-release-manifest
          path: release-artifacts/staging-release-manifest.json
          retention-days: 14

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - build-release-candidate
    environment: staging
    env:
      STAGING_DEPLOY_WEBHOOK_URL: ${{ secrets.STAGING_DEPLOY_WEBHOOK_URL }}
      STAGING_HEALTHCHECK_URL: ${{ vars.STAGING_HEALTHCHECK_URL }}
    steps:
      - name: Download release manifest
        uses: actions/download-artifact@v5
        with:
          name: staging-release-manifest
          path: release-artifacts

      - name: Download backend bundle
        uses: actions/download-artifact@v5
        with:
          name: backend-staging-bundle
          path: release-artifacts

      - name: Download dashboard bundle
        uses: actions/download-artifact@v5
        with:
          name: dashboard-staging-bundle
          path: release-artifacts

      - name: Trigger staging deployment webhook
        if: env.STAGING_DEPLOY_WEBHOOK_URL != ''
        run: |
          cat > release-artifacts/deploy-payload.json <<JSON
          {
            "repository": "${{ github.repository }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "runId": "${{ github.run_id }}",
            "artifacts": [
              "backend-staging-bundle",
              "dashboard-staging-bundle",
              "staging-release-manifest"
            ]
          }
          JSON
          curl -fsSL \
            -X POST \
            -H "Content-Type: application/json" \
            --data @release-artifacts/deploy-payload.json \
            "$STAGING_DEPLOY_WEBHOOK_URL"

      - name: Skip deploy when staging target is not configured
        if: env.STAGING_DEPLOY_WEBHOOK_URL == ''
        run: |
          echo "No STAGING_DEPLOY_WEBHOOK_URL secret is configured."
          echo "Release bundles were built and uploaded, but deployment was skipped."

      - name: Run staging health check
        if: env.STAGING_DEPLOY_WEBHOOK_URL != '' && env.STAGING_HEALTHCHECK_URL != ''
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsSL "$STAGING_HEALTHCHECK_URL" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "Staging health check failed."
          exit 1
