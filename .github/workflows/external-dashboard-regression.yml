name: External Dashboard Regression

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  admin-setup-entry-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 54329:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vervet_network
        options: >-
          --health-cmd "pg_isready -U postgres -d vervet_network"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:54329/vervet_network?schema=public
      ADMIN_API_TOKEN: local-admin-token
      WEBHOOK_SIGNING_MASTER_SECRET: ci-webhook-signing-master-secret
      CORS_ALLOWED_ORIGINS: http://localhost:3001
      VERVET_API_BASE_URL: http://localhost:3000
      DASHBOARD_SESSION_SECRET: ci-dashboard-session-secret-2026-03-14
      NODE_ENV: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            dashboard/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browsers
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate

      - name: Apply database migrations
        working-directory: backend
        run: npm run db:migrate:deploy

      - name: Seed database
        working-directory: backend
        run: npm run db:seed

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Lint dashboard
        working-directory: dashboard
        run: npm run lint

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Start backend
        working-directory: backend
        run: nohup npm run start:prod > ci-backend.log 2>&1 &

      - name: Start dashboard
        working-directory: dashboard
        run: nohup env PORT=3001 npm run start > ci-dashboard.log 2>&1 &

      - name: Wait for backend and dashboard
        run: |
          for attempt in $(seq 1 60); do
            if curl -sf http://localhost:3000/v1/health >/dev/null && curl -sf http://localhost:3001/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend or dashboard failed to start."
          exit 1

      - name: Run admin setup entry smoke
        working-directory: dashboard
        env:
          PLAYWRIGHT_DISABLE_WEBSERVER: "1"
        run: npm run test:playwright:admin-setup-entry

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: admin-setup-entry-smoke-artifacts
          path: |
            dashboard/playwright-report
            dashboard/test-results
            backend/ci-backend.log
            dashboard/ci-dashboard.log

