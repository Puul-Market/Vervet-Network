name: CI / Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "dashboard/**"
      - ".github/workflows/ci-deploy.yml"
      - ".github/actions/**"
  pull_request:
    paths:
      - "backend/**"
      - "dashboard/**"
      - ".github/workflows/ci-deploy.yml"
      - ".github/actions/**"
  workflow_dispatch:

concurrency:
  group: ci-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Quality checks (no DB needed)
  # ─────────────────────────────────────────────
  quality:
    name: "🧪 Quality checks"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ADMIN_API_TOKEN: local-admin-token
      WEBHOOK_SIGNING_MASTER_SECRET: ci-webhook-signing-master-secret
      CORS_ALLOWED_ORIGINS: http://localhost:3001
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            dashboard/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Validate Prisma schema
        working-directory: backend
        run: npm run prisma:validate

      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Run backend unit tests
        working-directory: backend
        run: npm test -- --runInBand

      - name: Lint dashboard
        working-directory: dashboard
        run: npm run lint

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

  # ─────────────────────────────────────────────
  # Stage 2: E2E tests (needs Postgres)
  # ─────────────────────────────────────────────
  e2e:
    name: "🔬 Backend e2e tests"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 54329:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vervet_network
        options: >-
          --health-cmd "pg_isready -U postgres -d vervet_network"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:54329/vervet_network?schema=public
      ADMIN_API_TOKEN: local-admin-token
      WEBHOOK_SIGNING_MASTER_SECRET: ci-webhook-signing-master-secret
      CORS_ALLOWED_ORIGINS: http://localhost:3001
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate

      - name: Apply database migrations
        working-directory: backend
        run: npm run db:migrate:deploy

      - name: Seed database
        working-directory: backend
        run: npm run db:seed

      - name: Run backend e2e tests
        working-directory: backend
        run: npm run test:e2e -- --runInBand

  # ─────────────────────────────────────────────
  # Stage 3a: Deploy backend to EC2 (main only)
  # ─────────────────────────────────────────────
  deploy-production:
    name: "🚀 Deploy to EC2"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    env:
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_USER: ${{ vars.EC2_USER }}
      EC2_DEPLOY_PATH: ${{ vars.EC2_DEPLOY_PATH }}
      PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      ADMIN_API_TOKEN: ci-deploy-token
      WEBHOOK_SIGNING_MASTER_SECRET: ci-deploy-placeholder
      CORS_ALLOWED_ORIGINS: "*"
    steps:
      - name: Check out repository
        if: env.EC2_HOST != ''
        uses: actions/checkout@v5

      - name: Set up Node.js
        if: env.EC2_HOST != ''
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        if: env.EC2_HOST != ''
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        if: env.EC2_HOST != ''
        working-directory: backend
        run: npm run prisma:generate

      - name: Build backend
        if: env.EC2_HOST != ''
        working-directory: backend
        run: npm run build

      - name: Prepare SSH key
        if: env.EC2_HOST != ''
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to EC2
        if: env.EC2_HOST != ''
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --include='dist/***' \
            --include='prisma/***' \
            --include='package.json' \
            --include='package-lock.json' \
            --include='prisma.config.ts' \
            --include='tsconfig.json' \
            --exclude='*' \
            backend/ \
            "$EC2_USER@$EC2_HOST:$EC2_DEPLOY_PATH/"

      - name: Install production dependencies and run migrations
        if: env.EC2_HOST != ''
        run: |
          ssh -i ~/.ssh/deploy_key "$EC2_USER@$EC2_HOST" << DEPLOY_SCRIPT
            cd $EC2_DEPLOY_PATH
            npm install --omit=dev
            npx prisma generate
            npx prisma migrate deploy
          DEPLOY_SCRIPT

      - name: Restart backend service
        if: env.EC2_HOST != ''
        run: |
          ssh -i ~/.ssh/deploy_key "$EC2_USER@$EC2_HOST" << RESTART_SCRIPT
            cd $EC2_DEPLOY_PATH
            if command -v pm2 &>/dev/null; then
              pm2 restart vervet-backend --update-env || pm2 start dist/src/main.js --name vervet-backend
            else
              sudo systemctl restart vervet-backend
            fi
          RESTART_SCRIPT

      - name: Skip deploy — secrets not configured
        if: env.EC2_HOST == ''
        run: |
          echo "⚠️  EC2_HOST is not configured."
          echo "Backend tests passed but deployment was skipped."

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ─────────────────────────────────────────────
  # Stage 3b: Deploy staging (main only, parallel)
  # ─────────────────────────────────────────────
  deploy-staging:
    name: "🏗️ Deploy staging"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [quality, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 54329:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vervet_network
        options: >-
          --health-cmd "pg_isready -U postgres -d vervet_network"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:54329/vervet_network?schema=public
      ADMIN_API_TOKEN: local-admin-token
      WEBHOOK_SIGNING_MASTER_SECRET: ci-webhook-signing-master-secret
      CORS_ALLOWED_ORIGINS: http://localhost:3001
      DASHBOARD_SESSION_SECRET: ${{ secrets.STAGING_DASHBOARD_SESSION_SECRET }}
      VERVET_API_BASE_URL: ${{ vars.STAGING_VERVET_API_BASE_URL }}
      STAGING_DEPLOY_WEBHOOK_URL: ${{ secrets.STAGING_DEPLOY_WEBHOOK_URL }}
      STAGING_HEALTHCHECK_URL: ${{ vars.STAGING_HEALTHCHECK_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            dashboard/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate

      - name: Apply database migrations
        working-directory: backend
        run: npm run db:migrate:deploy

      - name: Seed staging database
        working-directory: backend
        run: npm run db:seed

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Prepare release artifact
        run: |
          mkdir -p release/backend release/dashboard
          cp -R backend/dist release/backend/dist
          cp -R backend/prisma release/backend/prisma
          cp backend/package.json release/backend/package.json
          cp backend/package-lock.json release/backend/package-lock.json
          cp -R dashboard/.next release/dashboard/.next
          cp -R dashboard/public release/dashboard/public
          cp dashboard/package.json release/dashboard/package.json
          cp dashboard/package-lock.json release/dashboard/package-lock.json
          cat <<EOF > release/manifest.json
          {
            "gitSha": "${{ github.sha }}",
            "gitRef": "${{ github.ref_name }}",
            "runId": "${{ github.run_id }}",
            "createdAtUtc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload staging release artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-release-${{ github.sha }}
          path: release
          retention-days: 7

      - name: Trigger staging deploy webhook
        if: env.STAGING_DEPLOY_WEBHOOK_URL != ''
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            --data @release/manifest.json \
            "$STAGING_DEPLOY_WEBHOOK_URL"

      - name: Skip staging deploy webhook
        if: env.STAGING_DEPLOY_WEBHOOK_URL == ''
        run: echo "No STAGING_DEPLOY_WEBHOOK_URL configured; skipping."

      - name: Run staging health check
        if: env.STAGING_HEALTHCHECK_URL != ''
        run: |
          for attempt in $(seq 1 20); do
            status=$(curl -sf -o /dev/null -w "%{http_code}" "$STAGING_HEALTHCHECK_URL" || echo "000")
            if [ "$status" = "200" ]; then
              echo "Staging health check passed."
              exit 0
            fi
            echo "Attempt $attempt/20 returned HTTP $status; retrying in 5s..."
            sleep 5
          done
          echo "Staging health check failed."
          exit 1

      - name: Skip staging health check
        if: env.STAGING_HEALTHCHECK_URL == ''
        run: echo "No STAGING_HEALTHCHECK_URL configured; skipping."

  # ─────────────────────────────────────────────
  # Stage 4: Health check + Summary
  # ─────────────────────────────────────────────
  health-check:
    name: "🏥 Production health check"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy-production
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    env:
      PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
    steps:
      - name: Wait for backend to stabilize
        if: env.PRODUCTION_API_URL != ''
        run: sleep 10

      - name: Check backend health endpoint
        if: env.PRODUCTION_API_URL != ''
        run: |
          for attempt in $(seq 1 30); do
            status=$(curl -sf -o /dev/null -w "%{http_code}" "$PRODUCTION_API_URL/v1/health" || echo "000")
            if [ "$status" = "200" ]; then
              echo "✅ Backend is healthy (HTTP $status)"
              exit 0
            fi
            echo "Attempt $attempt/30: HTTP $status — retrying in 5s..."
            sleep 5
          done
          echo "❌ Health check failed after 30 attempts."
          exit 1

      - name: Skip health check — URL not configured
        if: env.PRODUCTION_API_URL == ''
        run: echo "⚠️  PRODUCTION_API_URL not configured; skipping."

  summary:
    name: "📋 Summary"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [quality, e2e, deploy-production, deploy-staging, health-check]
    if: always()
    env:
      PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
    steps:
      - name: Generate deployment summary
        run: |
          echo "## 📋 CI / Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run** | [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality checks | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E tests | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production deploy | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Staging deploy | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health check | ${{ needs.health-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dashboard deploys are handled by Vercel's GitHub integration." >> $GITHUB_STEP_SUMMARY
