services:
  postgres:
    image: postgres:16-alpine
    container_name: vervet-network-postgres
    restart: unless-stopped
    ports:
      - "54329:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vervet_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vervet_network"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - vervet-network-postgres:/var/lib/postgresql/data

volumes:
  vervet-network-postgres:
